name: server-build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npm run build

      - name: Run server + health check
        env:
          NODE_ENV: development
          PORT: 8080
          JWT_SECRET: ci-jwt-secret-123
          JWT_REFRESH_SECRET: ci-refresh-secret-123
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          OPENAI_API_KEY: sk-ci-test-key
          REDIS_URL: redis://127.0.0.1:6379
        run: |
          node dist/index.js &
          sleep 5
          curl -f http://localhost:8080/health
