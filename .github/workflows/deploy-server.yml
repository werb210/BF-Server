name: Deploy BF Server

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      # allow TS errors
      - run: npx tsc --noEmit || true

      # allow build issues
      - run: npm run build || true

      - run: echo "deploy"
