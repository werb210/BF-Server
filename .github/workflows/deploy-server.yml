name: Deploy BF Server

on:
  push:
    branches:
      - main

env:
  AZURE_WEBAPP_NAME: YOUR_APP_NAME
  NODE_VERSION: 20

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ✅ Install Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # ✅ Install ALL deps (critical fix)
      - name: Install dependencies
        run: npm ci

      # ✅ Build
      - name: Build
        run: npm run build

      # ✅ (optional but correct)
      - name: Test
        run: npm run test

      # ✅ Login to Azure
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 🔥 CRITICAL FIX — deploy ROOT, not dist
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: .
