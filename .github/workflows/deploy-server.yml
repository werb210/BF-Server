name: Deploy BF Server (Hard Reset Deploy)

on:
  push:
    branches:
      - main

concurrency:
  group: bf-server
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare deploy package
        run: |
          mkdir deploy
          cp -r dist package.json package-lock.json deploy/
          cd deploy
          zip -r ../deploy.zip .

      - name: Install Azure CLI
        run: |
          curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash

      - name: Azure Login
        run: |
          az login --service-principal \
            -u $(echo '${{ secrets.AZURE_CREDENTIALS }}' | jq -r .clientId) \
            -p $(echo '${{ secrets.AZURE_CREDENTIALS }}' | jq -r .clientSecret) \
            --tenant $(echo '${{ secrets.AZURE_CREDENTIALS }}' | jq -r .tenantId)

      - name: HARD RESET DEPLOYMENT STATE
        run: |
          az webapp stop \
            --name boreal-staff-server \
            --resource-group boreal-staff-server_group || true

          az webapp deployment source config-zip \
            --name boreal-staff-server \
            --resource-group boreal-staff-server_group \
            --src deploy.zip

      - name: START APP
        run: |
          az webapp start \
            --name boreal-staff-server \
            --resource-group boreal-staff-server_group
