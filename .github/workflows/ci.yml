name: server-ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: npm ci

      - name: Guard
        run: npm run test:guard

      - name: Run tests
        run: |
          npm run test:ci | tee ci_output.log

      - name: Enforce completion marker
        run: |
          grep -q "CI_TESTS_COMPLETE" ci_output.log
