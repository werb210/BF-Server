name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node 20
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: "npm"

      - name: Install deps
        run: npm install --include=optional

      - name: Build
        run: npm run build

      # BF_SERVER_SPLIT_INTEGRATION_TESTS_v1
      # This step used to be a no-op that echoed a skip message, under the
      # heading "no test suite yet". There are 885 tests. Nothing had run them
      # in CI for a long time, so no regression could ever be caught here -
      # every block had to carry its own gate. Tests needing live
      # infrastructure are excluded by vitest.config.ts and run separately
      # via `npm run test:integration`.
      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm run test:ci
